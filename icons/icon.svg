<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Outer ring -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Intermediate ring -->
  <circle cx="64" cy="64" r="42" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <!-- Inner ring -->
  <circle cx="64" cy="64" r="28" fill="none" stroke="#ffffff" stroke-width="2"/>
  <!-- Full crosshair lines -->
  <line x1="8" y1="64" x2="120" y2="64" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="8" x2="64" y2="120" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Cardinal tick marks -->
  <line x1="64" y1="2" x2="64" y2="12" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="116" x2="64" y2="126" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="2" y1="64" x2="12" y2="64" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <line x1="116" y1="64" x2="126" y2="64" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  <!-- Intercardinal tick marks -->
  <line x1="19" y1="19" x2="27" y2="27" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="109" y1="19" x2="101" y2="27" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="19" y1="109" x2="27" y2="101" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="109" y1="109" x2="101" y2="101" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="64" cy="64" r="5" fill="#ffffff"/>
</svg>
