<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    :root {
      --bg: #010e24;
      --surface: #061934;
      --text: #dbe6ff;
      --text-dim: #9eabc8;
      --primary: #50e1f9;
      --primary-container: #00bcd4;
      --border: #3b4861;
      --radius: 8px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 16px;
    }
    h1 {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 4px;
      color: var(--primary);
    }
    p.desc {
      font-size: 11px;
      color: var(--text-dim);
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .status {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }
    .status .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--primary-container);
      flex-shrink: 0;
    }
    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 6px;
      color: var(--text);
    }
    .field select {
      width: 100%;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .field select:focus {
      outline: none;
      border-color: var(--primary);
    }
    .saved {
      display: inline-block;
      font-size: 11px;
      color: var(--primary-container);
      margin-top: 6px;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .saved.show {
      opacity: 1;
    }
    .checkbox-field {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 12px;
      font-size: 11px;
      color: var(--text);
      cursor: pointer;
    }
    .checkbox-field input {
      accent-color: var(--primary-container);
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Element Picker</h1>
  <p class="desc">Picker ativo — clique em qualquer elemento da página.</p>

  <div class="status">
    <span class="dot"></span>
    <span>Picker ativo</span>
  </div>

  <div class="field">
    <label for="format-select">Formato de saída</label>
    <select id="format-select">
      <option value="full">Completo (markdown)</option>
      <option value="selector">Apenas CSS Selector</option>
      <option value="component">Componente + Seletor</option>
      <option value="xpath">XPath</option>
      <option value="html">HTML (outerHTML)</option>
    </select>
    <span class="saved" id="saved-msg">&#10003; Salvo</span>
  </div>

  <label class="checkbox-field">
    <input type="checkbox" id="screenshot-checkbox">
    Capturar screenshot
  </label>

  <div class="field" id="screenshot-size-field" style="display:none;">
    <label for="screenshot-size">Tamanho do screenshot</label>
    <select id="screenshot-size">
      <option value="full">Original (JPEG)</option>
      <option value="medium" selected>Médio — 50%</option>
      <option value="small">Pequeno — 25%</option>
      <option value="micro">Micro — 15%</option>
    </select>
  </div>

  <script src="popup.js"></script>
</body>
</html>
